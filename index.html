<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IRON LOG</title>
<style>
:root{
  --bg:#0d0d0d;--surface:#141414;--card:#1a1a1a;--card2:#202020;
  --border:#2a2a2a;--border2:#383838;
  --accent:#d4f000;--red:#ff4422;--green:#22ff88;--blue:#00d4ff;--orange:#ffaa00;
  --text:#f0f0f0;--muted:#666;--muted2:#999;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fm:'SF Mono','Fira Code','Cascadia Code',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;padding-bottom:80px;font-size:15px}

/* HEADER */
.hdr{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:1.6rem;font-weight:900;letter-spacing:-.02em;color:var(--accent)}
.hdr-title span{color:var(--text)}
.hdr-sub{font-size:.62rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.gear{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);font-size:.7rem;padding:6px 12px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f);min-height:36px}
.gear:hover{border-color:var(--accent);color:var(--accent)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;overflow-x:auto}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-size:.9rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:10px 16px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;font-family:var(--f)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text)}

.main{max-width:860px;margin:0 auto;padding:18px 14px}

/* BUTTONS */
.btn-y{background:var(--accent);border:none;color:#000;font-size:.9rem;font-weight:700;padding:10px 22px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:background .15s;font-family:var(--f);min-height:44px}
.btn-y:hover{background:#fff}
.btn-o{background:none;border:1px solid var(--border);color:var(--muted);font-size:.72rem;padding:7px 13px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f);min-height:38px}
.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-r{color:#883333!important;border-color:#3a1515!important}
.btn-r:hover{color:var(--red)!important;border-color:var(--red)!important}
.btn-g{color:var(--green)!important;border-color:#1a3a1a!important}
.btn-g:hover{border-color:var(--green)!important}

/* WEEK NAV */
.wknav{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.wk-arrow{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1rem;width:36px;height:36px;cursor:pointer;transition:all .15s;flex-shrink:0}
.wk-arrow:hover{border-color:var(--accent);color:var(--accent)}
.wk-label{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.wk-label .n{color:var(--accent)}
.wk-today{background:none;border:1px solid var(--border);color:var(--muted);font-size:.65rem;padding:5px 10px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f)}
.wk-today:hover{border-color:var(--accent);color:var(--accent)}

/* EMPTY */
.empty{text-align:center;color:var(--muted);padding:44px 20px;line-height:2.4;font-size:.85rem}
.empty .ico{font-size:2rem;display:block;margin-bottom:8px}

/* SESSION CARD */
.scard{background:var(--card);border:1px solid var(--border);margin-bottom:14px}
.scard-head{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .15s}
.scard-head:hover{background:var(--card2)}
.scard.on .scard-head{border-bottom-color:var(--border)}
.chev{color:var(--muted);font-size:.75rem;transition:transform .2s;flex-shrink:0}
.scard.on .chev{transform:rotate(90deg)}
.scard-info{flex:1;min-width:0}
.scard-rname{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.scard-date{font-size:.65rem;color:var(--muted);margin-top:1px}
.scard-meta{font-size:.7rem;color:var(--muted2);text-align:right;flex-shrink:0;line-height:1.5}
.scard-body{display:none;padding:14px 14px 10px}
.scard.on .scard-body{display:block}

/* EXERCISE BLOCK */
.exb{margin-bottom:4px;border:1px solid var(--border);background:var(--surface)}
.exb-head{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border)}
.exb-name{font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.exb-rec{font-size:.65rem;color:var(--muted2);text-align:right;line-height:1.4}
.exb-rec .up{color:var(--green);font-weight:700}
.exb-rec .hold{color:var(--muted2)}
.exb-rec .down{color:var(--red);font-weight:700}
.exb-rec .warn{color:var(--orange);font-weight:700}
.exb-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:2px 4px;flex-shrink:0;transition:color .15s}
.exb-del:hover{color:var(--red)}
.exb-body{padding:8px 12px 10px}

/* SET ROWS */
.sets-wrap{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.set-row{display:flex;align-items:center;gap:5px}
.snum{color:var(--muted);font-size:.7rem;width:16px;flex-shrink:0;text-align:center;font-family:var(--fm)}
.sel-w,.sel-r{
  background:var(--card2);border:1px solid var(--border2);color:var(--text);
  font-family:var(--fm);font-size:16px;padding:0 4px;cursor:pointer;
  outline:none;-webkit-appearance:none;appearance:none;border-radius:0;
  height:44px;
}
.sel-w{flex:2;min-width:0}
.sel-r{flex:1;min-width:0}
.sel-w:focus,.sel-r:focus{border-color:var(--accent)}
.del-set{background:none;border:none;color:var(--border2);cursor:pointer;font-size:1rem;padding:0 6px;flex-shrink:0;height:44px;transition:color .15s}
.del-set:hover{color:var(--red)}
.set-btns{display:flex;gap:6px}

/* ADD EXERCISE PICKER — inside session */
.ex-picker-wrap{margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.ex-picker-label{font-size:.6rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.ex-picker-row{display:flex;gap:6px;align-items:stretch;flex-wrap:wrap;margin-bottom:8px}
.ex-search-row{margin-top:0}
.ex-search-label{font-size:.6rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.ex-picker-sel{
  flex:1;min-width:0;
  background:var(--card2);border:1px solid var(--accent);color:var(--text);
  font-family:var(--f);font-size:16px;padding:0 10px;cursor:pointer;
  outline:none;-webkit-appearance:none;appearance:none;border-radius:0;
  height:44px;
}
.new-ex-input{
  flex:1;min-width:0;
  background:var(--card2);border:1px solid var(--border2);color:var(--text);
  font-family:var(--f);font-size:16px;padding:0 10px;
  outline:none;height:44px;
}
.new-ex-input::placeholder{color:var(--muted)}
.new-ex-input:focus{border-color:var(--blue)}
/* Search results list */
.ex-search-results{margin-top:4px;display:flex;flex-direction:column;gap:2px}
.ex-sr-item{display:flex;align-items:center;gap:7px;padding:9px 11px;background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:border-color .12s;flex-wrap:wrap}
.ex-sr-item:hover{border-color:var(--accent)}
.ex-sr-name{font-size:.85rem;font-weight:600;flex:1;min-width:0}
.ex-sr-tag{font-size:.58rem;letter-spacing:.07em;text-transform:uppercase;padding:2px 6px;font-weight:700}
.ex-sr-tag-routine{background:#1a1f00;color:var(--accent);border:1px solid #3a4400}
.ex-sr-tag-other{background:#0a1218;color:var(--blue);border:1px solid #0a2a38}
.ex-sr-wt{font-size:.72rem;color:var(--muted2);font-family:var(--fm);margin-left:auto}
.ex-sr-new{padding:9px 11px;background:var(--surface);border:1px solid var(--border);cursor:pointer;font-size:.82rem;color:var(--muted2);transition:border-color .12s}
.ex-sr-new:hover{border-color:var(--accent)}

/* REC PANEL */
.rec-panel{border-radius:0;padding:9px 11px;margin-bottom:9px;font-size:.78rem;line-height:1.6;border-left:3px solid var(--border)}
.rec-panel.rec-up{border-left-color:var(--green);background:#0a1a0a}
.rec-panel.rec-hold{border-left-color:var(--border2);background:#181818}
.rec-panel.rec-down{border-left-color:var(--red);background:#1a0a0a}
.rec-panel.rec-warn{border-left-color:var(--orange);background:#1a1400}
.rec-panel.rec-rebuild{border-left-color:var(--blue);background:#0a1218}
.rec-panel.rec-confirm{border-left-color:var(--accent);background:#1a1a00}
.rec-head{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px;color:var(--text)}
.rec-up .rec-head{color:var(--green)}
.rec-down .rec-head{color:var(--red)}
.rec-warn .rec-head{color:var(--orange)}
.rec-rebuild .rec-head{color:var(--blue)}
.rec-body{color:var(--muted2);font-size:.74rem;line-height:1.6;margin-bottom:5px}
.rec-target{font-size:.78rem;color:var(--muted);margin-top:4px}
.rec-target strong{color:var(--accent);font-size:.9rem}
.rec-last{display:flex;flex-wrap:wrap;gap:5px;align-items:center;margin-bottom:6px}
.rec-last-label{font-size:.6rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-right:3px}
.rec-set-chip{background:var(--surface);border:1px solid var(--border);padding:2px 7px;font-size:.75rem;font-family:var(--fm);white-space:nowrap}
.sess-actions{display:flex;gap:7px;flex-wrap:wrap;padding-top:10px;border-top:1px solid var(--border);margin-top:10px}

/* DIVIDER */
.divr{height:1px;background:var(--border);margin:10px 0}

/* ROUTINES */
.rout-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.sec-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tmpl-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tc{background:none;border:1px solid var(--border);color:var(--muted);font-size:.68rem;padding:5px 12px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f)}
.tc:hover{border-color:var(--blue);color:var(--blue)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.rcard{background:var(--card);border:1px solid var(--border);transition:border-color .15s}
.rcard:hover{border-color:var(--border2)}
.rcard-h{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid var(--border)}
.rcard-name{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.rcard-ct{font-size:.65rem;color:var(--muted)}
.rcard-exlist{padding:9px 13px;display:flex;flex-direction:column;gap:3px}
.rex{font-size:.74rem;color:var(--muted2);display:flex;align-items:center;gap:5px}
.rex::before{content:'';display:inline-block;width:4px;height:4px;background:var(--accent);border-radius:50%;flex-shrink:0}
.rcard-foot{display:flex;gap:6px;padding:8px 13px;border-top:1px solid var(--border)}

/* EDITOR */
.editor{background:var(--card);border:1px solid var(--accent);padding:18px;margin-bottom:18px}
.editor h3{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:14px}
.frow{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.frow input{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:16px;padding:0 10px;outline:none;transition:border-color .15s;height:42px}
.frow input:focus{border-color:var(--accent)}
.frow input::placeholder{color:var(--muted)}
.exchips{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.exc{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);padding:6px 10px;font-size:.78rem;font-family:var(--fm)}
.exc span{flex:1}
.exc button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;padding:0 3px;transition:color .15s;min-height:28px}
.exc button:hover{color:var(--red)}
.ed-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:4px}

/* PROGRESS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.pcard{background:var(--card);border:1px solid var(--border);padding:12px 13px}
.pcard-name{font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
.pcard-rout{font-size:.6rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.pstat{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:3px}
.pstat span:last-child{color:var(--text);font-family:var(--fm)}
.pr-tag{display:inline-block;background:var(--accent);color:#000;font-size:.55rem;font-weight:700;letter-spacing:.08em;padding:1px 5px;text-transform:uppercase;margin-left:5px;vertical-align:middle}
.spark{width:100%;height:34px;margin-top:7px}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;padding:14px}
.overlay.on{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:14px}
.modal label{display:block;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.modal input,.modal select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:16px;padding:0 10px;outline:none;margin-bottom:12px;height:42px;transition:border-color .15s}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.rpicker{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;margin-bottom:12px}
.rpi{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);padding:9px 12px;cursor:pointer;transition:border-color .15s}
.rpi:hover{border-color:var(--blue)}
.rpi.sel{border-color:var(--accent)}
.rpi-name{font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.rpi-ct{font-size:.63rem;color:var(--muted)}
.rpi-chk{color:var(--accent)}

.hidden{display:none!important}

@media(max-width:460px){
  .main{padding:12px 10px}
  .rgrid{grid-template-columns:1fr}
  .sel-w,.sel-r{font-size:.82rem}
}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">IRON<span> LOG</span></div>
    <div class="hdr-sub">Workout Tracker</div>
  </div>
  <button class="gear" onclick="openSettings()">&#9881; Settings</button>
</header>

<nav class="tabs">
  <button class="tab on" data-tab="log" onclick="switchTab('log',this)">Log</button>
  <button class="tab" data-tab="routines" onclick="switchTab('routines',this)">Routines</button>
  <button class="tab" data-tab="progress" onclick="switchTab('progress',this)">Progress</button>
</nav>

<div class="main">

  <!-- LOG -->
  <div id="t-log">
    <div class="wknav">
      <button class="wk-arrow" onclick="changeWeek(-1)">&#8249;</button>
      <div class="wk-label">Week <span class="n" id="wknum">1</span> &mdash; <span id="wkrange"></span></div>
      <button class="wk-today" onclick="resetWeek()">Today</button>
      <button class="wk-arrow" onclick="changeWeek(1)">&#8250;</button>
    </div>
    <div style="margin-bottom:18px">
      <button class="btn-y" onclick="openPicker()">+ Log Session</button>
    </div>
    <div id="sesslist"></div>
  </div>

  <!-- ROUTINES -->
  <div id="t-routines" class="hidden">
    <div id="editor" class="editor hidden">
      <h3 id="ed-title">New Routine</h3>
      <div class="frow"><input type="text" id="rname" placeholder="Routine name (e.g. Push Day)"/></div>
      <div class="sec-title" style="margin-top:6px">Exercises</div>
      <div class="exchips" id="ed-exlist"></div>
      <div class="frow">
        <input type="text" id="exinput" placeholder="Add exercise..." onkeydown="if(event.key==='Enter')addEdEx()"/>
        <button class="btn-o" onclick="addEdEx()">+ Add</button>
      </div>
      <div class="ed-actions">
        <button class="btn-y" onclick="saveRoutine()">Save Routine</button>
        <button class="btn-o" onclick="closeEditor()">Cancel</button>
      </div>
    </div>
    <div class="rout-bar">
      <div style="font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em">My Routines</div>
      <button class="btn-y" onclick="openEditor(null)">+ New Routine</button>
    </div>
    <div class="rgrid" id="routinelist"></div>
  </div>

  <!-- PROGRESS -->
  <div id="t-progress" class="hidden">
    <div id="progcontent"></div>
  </div>

</div>

<!-- SESSION PICKER -->
<div class="overlay" id="m-picker">
  <div class="modal">
    <h2>Start Session</h2>
    <label>Date</label>
    <input type="date" id="m-date"/>
    <label>Routine</label>
    <div class="rpicker" id="m-rlist"></div>
    <div class="mactions">
      <button class="btn-o" onclick="closeOverlay('m-picker')">Cancel</button>
      <button class="btn-o" style="border-color:var(--accent);color:var(--accent)" onclick="confirmSession()">Start &rarr;</button>
    </div>
  </div>
</div>

<!-- SETTINGS -->
<div class="overlay" id="m-settings">
  <div class="modal">
    <h2>Settings</h2>
    <div style="background:var(--surface);border-left:3px solid var(--accent);padding:8px 11px;font-size:.72rem;color:var(--muted2);line-height:1.6;margin-bottom:14px">
      <strong style="color:var(--text)">6-8 Rep Double Progression</strong><br>
      Hit 8 reps on all sets &rarr; add weight next session.
    </div>
    <label>Upper Body Increment (lbs)</label>
    <input type="number" id="s-inc" min="1" max="50" step="1"/>
    <label>Lower Body Increment (lbs)</label>
    <input type="number" id="s-inc2" min="2.5" max="100" step="2.5"/>
    <label>Default Sets per Exercise</label>
    <input type="number" id="s-sets" min="1" max="10" step="1"/>
    <div class="mactions">
      <button class="btn-o" onclick="closeOverlay('m-settings')">Cancel</button>
      <button class="btn-o" style="border-color:var(--accent);color:var(--accent)" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
// ── STATE ─────────────────────────────────────────────────────────────────────
var DB_KEY = 'ironlog5';
var db = {
  cfg: {inc:5, inc2:10, sets:3},
  routines: [],
  // sessions.exercises = [{id, name, sets:[{w,r}]}]  (ordered, dynamic)
  sessions: []
};

function dbLoad(){
  try{ var s=localStorage.getItem(DB_KEY); if(s) db=JSON.parse(s); }catch(e){}
}
function dbSave(){
  try{ localStorage.setItem(DB_KEY, JSON.stringify(db)); }catch(e){}
}

// ── WEIGHT / REP OPTIONS ──────────────────────────────────────────────────────
var W_OPTS = (function(){
  var o='<option value="0">-- lbs</option>';
  for(var w=2.5; w<=500; w+=2.5) o+='<option value="'+w+'">'+w+' lbs</option>';
  return o;
})();
var R_OPTS = (function(){
  var o='<option value="0">-- reps</option>';
  for(var r=1; r<=20; r++) o+='<option value="'+r+'">'+r+' rep'+(r===1?'':'s')+'</option>';
  return o;
})();

// ── WEEK HELPERS ──────────────────────────────────────────────────────────────
var wkOff = 0;
function monOf(off){
  var d=new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate()-((d.getDay()+6)%7)+off*7);
  return d;
}
function sunOf(off){ var d=monOf(off); d.setDate(d.getDate()+6); return d; }
function inWeek(ds,off){
  var d=new Date(ds+'T12:00:00');
  return d>=monOf(off) && d<=sunOf(off);
}
function wkRange(off){
  var m=monOf(off), s=sunOf(off);
  var f=function(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
  return f(m)+'\u2013'+f(s);
}
function wkSeqNum(off){
  var ms=monOf(off).toISOString().slice(0,10);
  var starts=[];
  db.sessions.forEach(function(s){
    var d=new Date(s.date+'T12:00:00');
    var m=new Date(d); m.setHours(0,0,0,0);
    m.setDate(m.getDate()-((m.getDay()+6)%7));
    var k=m.toISOString().slice(0,10);
    if(starts.indexOf(k)<0) starts.push(k);
  });
  starts.sort();
  if(!starts.length) return 1;
  var i=starts.indexOf(ms);
  return i<0 ? starts.length+1 : i+1;
}

// ── PROGRESSION ENGINE ────────────────────────────────────────────────────────
function isLowerBody(exName){
  return /squat|deadlift|leg press|leg curl|leg ext|lunge|hip thrust|glute|calf|rdl/i.test(exName||'');
}

// Look up history by exercise NAME across ALL sessions/routines
// This means Barbell Curl in Pull Day and Arms Day share the same data
function getExHistory(routineId, exId, exName){
  var name=(exName||'').trim().toLowerCase();
  var hist=[];
  db.sessions.forEach(function(s){
    var ex=(s.exercises||[]).find(function(e){
      // Match by name (case-insensitive) first, fall back to id for legacy data
      return e.name.trim().toLowerCase()===name || e.id===exId;
    });
    if(ex&&ex.sets&&ex.sets.length) hist.push({date:s.date,sets:ex.sets,routineName:(function(){
      var r=findRoutine(s.routineId); return r?r.name:'';
    })()});
  });
  hist.sort(function(a,b){ return b.date.localeCompare(a.date); });
  return hist;
}

function maxW(sets){ return sets.reduce(function(a,s){ return Math.max(a,s.w||0); },0); }
function totalR(sets){ return sets.reduce(function(a,s){ return a+(s.r||0); },0); }

function allSetsAt8(sets){
  var valid=sets.filter(function(s){ return (s.r||0)>0; });
  return valid.length>0 && valid.every(function(s){ return (s.r||0)>=8; });
}

function calcProg(routineId, exId, exName){
  var cfg=db.cfg;
  var inc=isLowerBody(exName)? cfg.inc2 : cfg.inc;
  var hist=getExHistory(routineId, exId, exName);

  if(!hist.length) return {t:'none', inc:inc, target:0, lastSets:null};

  var last  = hist[0];
  var prev  = hist.length>=2 ? hist[1] : null;
  var sets  = last.sets;
  var n     = sets.length;
  var wLast = maxW(sets);
  var rList = sets.map(function(s){ return s.r||0; });

  var setsBelow6 = rList.filter(function(r){ return r>0 && r<6; }).length;
  var setsAt8    = rList.filter(function(r){ return r>=8; }).length;
  var setsAt6to7 = rList.filter(function(r){ return r>=6 && r<8; }).length;
  var setBreakdown = rList.map(function(r,i){
    return 'Set '+(i+1)+': '+(r>0? r+' reps' : 'not logged');
  }).join(' \u00b7 ');

  var wPrev        = prev ? maxW(prev.sets) : null;
  var droppedWeight= wPrev!==null && wLast < wPrev;
  var raisedWeight = wPrev!==null && wLast > wPrev;

  // Did the PREVIOUS session also hit all-8s at the same weight?
  var prevAlsoAllAt8 = prev && maxW(prev.sets)===wLast && allSetsAt8(prev.sets);

  // Stall: same weight 3+ sessions, total reps not improving
  var stalled=false;
  if(hist.length>=3){
    var w0=maxW(hist[0].sets), w1=maxW(hist[1].sets), w2=maxW(hist[2].sets);
    var r0=totalR(hist[0].sets), r1=totalR(hist[1].sets), r2=totalR(hist[2].sets);
    stalled=(w0===w1 && w1===w2) && (r0<=r1 && r0<=r2);
  }

  // ── DECISION TREE ────────────────────────────────────────────────────────

  // 1. ANY set under 6 reps → weight too heavy
  if(setsBelow6>0){
    var drop=Math.round(wLast*0.90/2.5)*2.5;
    return {
      t:'down', inc:inc, target:drop, lastSets:sets, wLast:wLast, wPrev:wPrev,
      headline:'Too heavy \u2014 drop the weight',
      detail: setBreakdown+'. '
        +setsBelow6+' set'+(setsBelow6>1?'s':'')+' fell below 6 reps. '
        +'Below 6 reps shifts you out of the hypertrophy zone and increases injury risk. '
        +'Drop to '+drop+' lbs next session \u2014 that\'s a ~10% reduction. '
        +'Work back up in the 6\u20138 range before pushing heavier again.'
    };
  }

  // 2. You dropped weight AND hit 8s → rebuild to old weight, don't jump up
  if(droppedWeight && allSetsAt8(sets)){
    return {
      t:'rebuild', inc:inc, target:wPrev, lastSets:sets, wLast:wLast, wPrev:wPrev,
      headline:'Good session \u2014 rebuild to previous weight',
      detail: setBreakdown+' at '+wLast+' lbs. '
        +'You hit 8 on all sets but this weight ('+wLast+' lbs) is lower than where you were ('+wPrev+' lbs). '
        +'You can\'t count this as earned progression yet. '
        +'Next session go back to '+wPrev+' lbs and try to hit 6\u20138 reps. '
        +'If you nail it there, THEN we talk about going up.'
    };
  }

  // 3. You just raised weight → normal drop in reps expected, stay and build
  if(raisedWeight && setsBelow6===0 && setsAt8<n){
    return {
      t:'hold', inc:inc, target:wLast, lastSets:sets, wLast:wLast, wPrev:wPrev,
      headline:'New weight \u2014 stay and build reps',
      detail: setBreakdown+' at '+wLast+' lbs (up from '+wPrev+' lbs). '
        +'Dropping reps after a weight increase is completely normal and expected. '
        +'Your job now is to build every set back up to 8 before thinking about going higher. '
        +'Stay at '+wLast+' lbs next session.'
    };
  }

  // 4. All sets at 8 AND previous session at same weight was also all-8s → progress
  if(allSetsAt8(sets) && prevAlsoAllAt8){
    var next=wLast+inc;
    return {
      t:'up', inc:inc, target:next, lastSets:sets, wLast:wLast, wPrev:wPrev,
      headline:'Ready to go up \u2014 add '+inc+' lbs',
      detail: setBreakdown+' at '+wLast+' lbs. '
        +'You\'ve now hit 8 reps on all sets in back-to-back sessions at '+wLast+' lbs. '
        +'That\'s the confirmation you need. Add '+inc+' lbs next session ('+next+' lbs). '
        +'Expect to drop back to 6\u20137 reps at the new weight \u2014 that\'s the process. '
        +'Build back to 8 twice in a row and you\'ll go up again.'
    };
  }

  // 5. All sets at 8 but only once (last session) → one more session to confirm
  if(allSetsAt8(sets) && !prevAlsoAllAt8){
    return {
      t:'confirm', inc:inc, target:wLast, lastSets:sets, wLast:wLast, wPrev:wPrev,
      headline:'Almost there \u2014 do it again to confirm',
      detail: setBreakdown+' at '+wLast+' lbs. '
        +'You hit 8 reps on every set \u2014 great session. '
        +'But one good day isn\'t enough to confirm you\'ve truly mastered this weight. '
        +'Come back next session at '+wLast+' lbs and hit 8 on every set again. '
        +'If you do, you\'ve earned '+(wLast+inc)+' lbs.'
    };
  }

  // 6. Stalled: same weight, 3 sessions, no rep gain
  if(stalled){
    var deload=Math.round(wLast*0.80/2.5)*2.5;
    return {
      t:'warn', inc:inc, target:wLast, lastSets:sets, wLast:wLast, wPrev:wPrev,
      headline:'Stalled \u2014 time to reset',
      detail: setBreakdown+' at '+wLast+' lbs (3rd session with no improvement). '
        +'Options in order: '
        +'(a) Deload \u2014 drop to '+deload+' lbs for one session, same sets/reps, let your body recover, then come back fresh. '
        +'(b) Check form \u2014 a small technique tweak often unlocks reps immediately. '
        +'(c) Add volume \u2014 do one extra set at this weight before trying to progress.'
    };
  }

  // 7. Normal build — in 6-7 rep range
  var needed=n-setsAt8;
  return {
    t:'hold', inc:inc, target:wLast, lastSets:sets, wLast:wLast, wPrev:wPrev,
    headline:'Keep pushing \u2014 stay at '+wLast+' lbs',
    detail: setBreakdown+'. '
      +needed+' set'+(needed!==1?'s':'')+' still short of 8 reps. '
      +'Stay at '+wLast+' lbs and focus on those sets. '
      +'Once all sets hit 8 for two sessions in a row, you\'ll go up to '+(wLast+inc)+' lbs.'
  };
}

// ── SESSION MANAGEMENT ────────────────────────────────────────────────────────
var openCards={}, selRoutineId=null;

function sessVol(sess){
  return (sess.exercises||[]).reduce(function(a,ex){
    return a+(ex.sets||[]).reduce(function(b,s){ return b+(s.w||0)*(s.r||0); },0);
  },0);
}

// Add a known exercise (from routine) to a session
function addExToSess(sessId, exId){
  var sess=db.sessions.find(function(s){ return s.id===sessId; }); if(!sess) return;
  var r=findRoutine(sess.routineId); if(!r) return;
  var exDef=r.exercises.find(function(e){ return e.id===exId; }); if(!exDef) return;
  if((sess.exercises||[]).find(function(e){ return e.id===exId; })) return; // already added
  var hist=getExHistory(sess.routineId, exId, exDef.name);
  var numSets=db.cfg.sets||3;
  var lastSets=hist.length? hist[0].sets : null;
  var sets=[];
  for(var i=0;i<numSets;i++){
    if(lastSets&&lastSets[i]) sets.push({w:lastSets[i].w,r:lastSets[i].r});
    else if(lastSets&&lastSets.length) sets.push({w:lastSets[lastSets.length-1].w,r:lastSets[lastSets.length-1].r});
    else sets.push({w:0,r:0});
  }
  if(!sess.exercises) sess.exercises=[];
  sess.exercises.push({id:exId, name:exDef.name, sets:sets});
  dbSave(); renderLog();
}

// Add a brand-new exercise (creates it in routine + adds to session)
function addNewExToSess(sessId, name){
  name=(name||'').trim(); if(!name) return;
  var sess=db.sessions.find(function(s){ return s.id===sessId; }); if(!sess) return;
  var r=findRoutine(sess.routineId); if(!r) return;
  // Check if it already exists in routine by name
  var existing=r.exercises.find(function(e){ return e.name.toLowerCase()===name.toLowerCase(); });
  var exId;
  if(existing){
    exId=existing.id;
  } else {
    exId='e'+uid();
    r.exercises.push({id:exId, name:name});
  }
  // Add to session (reuse addExToSess logic but with new id already in routine)
  addExToSess(sessId, exId);
}

function removeExFromSess(sessId, exId){
  var sess=db.sessions.find(function(s){ return s.id===sessId; }); if(!sess) return;
  sess.exercises=(sess.exercises||[]).filter(function(e){ return e.id!==exId; });
  dbSave(); renderLog();
}

function addSet(sessId, exId){
  var sess=db.sessions.find(function(s){ return s.id===sessId; }); if(!sess) return;
  var ex=(sess.exercises||[]).find(function(e){ return e.id===exId; }); if(!ex) return;
  var last=ex.sets.length? ex.sets[ex.sets.length-1] : {w:0,r:0};
  ex.sets.push({w:last.w,r:last.r});
  dbSave(); renderLog();
}

function delSet(sessId, exId, i){
  var sess=db.sessions.find(function(s){ return s.id===sessId; }); if(!sess) return;
  var ex=(sess.exercises||[]).find(function(e){ return e.id===exId; }); if(!ex) return;
  ex.sets.splice(i,1);
  dbSave(); renderLog();
}

function updSet(sessId, exId, i, field, val){
  var sess=db.sessions.find(function(s){ return s.id===sessId; }); if(!sess) return;
  var ex=(sess.exercises||[]).find(function(e){ return e.id===exId; }); if(!ex) return;
  ex.sets[i][field]=parseFloat(val)||0;
  dbSave();
}

function delSession(id){
  if(!confirm('Delete this session?')) return;
  db.sessions=db.sessions.filter(function(s){ return s.id!==id; });
  delete openCards[id]; dbSave(); renderLog();
}

function toggleCard(id){
  openCards[id]=!openCards[id];
  var c=document.getElementById('sc-'+id); if(c) c.classList.toggle('on');
}

// Called when user selects from the routine dropdown
function onExPickerChange(sessId, sel){
  var val=sel.value;
  if(!val) return;
  addExToSess(sessId, val);
}

// Called as user types in the search box — shows matching exercises from ALL routines
function onExSearch(sessId, query){
  var sr=document.getElementById('ex-sr-'+sessId);
  if(!sr) return;
  query=(query||'').trim().toLowerCase();
  if(!query){ sr.innerHTML=''; return; }

  var sess=db.sessions.find(function(s){ return s.id===sessId; });
  if(!sess){ sr.innerHTML=''; return; }
  var addedNames=(sess.exercises||[]).map(function(e){ return e.name.trim().toLowerCase(); });

  // Collect all unique exercise names across all routines, filter by query
  var seen={};
  var results=[];
  db.routines.forEach(function(r){
    r.exercises.forEach(function(e){
      var nl=e.name.trim().toLowerCase();
      if(seen[nl]) return;
      seen[nl]=true;
      if(nl.indexOf(query)<0) return; // doesn't match
      if(addedNames.indexOf(nl)>=0) return; // already in session
      // Get last weight for this exercise
      var hist=getExHistory(r.id, e.id, e.name);
      var lastW=hist.length? maxW(hist[0].sets) : 0;
      var inThisRoutine=findRoutine(sess.routineId) &&
        findRoutine(sess.routineId).exercises.find(function(x){ return x.name.trim().toLowerCase()===nl; });
      results.push({id:e.id, name:e.name, routineName:r.name, lastW:lastW, inThisRoutine:!!inThisRoutine});
    });
  });

  if(!results.length){
    sr.innerHTML='<div class="ex-sr-new" onclick="confirmNewEx(\''+sessId+'\')">'
      +'<span style="color:var(--accent)">+</span> Add "<strong>'+esc(query)+'</strong>" as new exercise</div>';
    return;
  }

  sr.innerHTML=results.map(function(ex){
    var tag=ex.inThisRoutine
      ? '<span class="ex-sr-tag ex-sr-tag-routine">this routine</span>'
      : '<span class="ex-sr-tag ex-sr-tag-other">'+esc(ex.routineName)+'</span>';
    var wt=ex.lastW? '<span class="ex-sr-wt">\u2192 '+ex.lastW+' lbs</span>' : '';
    return '<div class="ex-sr-item" onclick="pickSearchResult(\''+sessId+'\',\''+esc(ex.id)+'\',\''+esc(ex.name)+'\')">'
      +'<span class="ex-sr-name">'+esc(ex.name)+'</span>'+tag+wt+'</div>';
  }).join('');
}

// User tapped a search result
function pickSearchResult(sessId, exId, exName){
  // Check if this exercise ID exists in the session's routine
  var sess=db.sessions.find(function(s){ return s.id===sessId; }); if(!sess) return;
  var r=findRoutine(sess.routineId); if(!r) return;
  var inRoutine=r.exercises.find(function(e){ return e.id===exId; });
  if(inRoutine){
    addExToSess(sessId, exId);
  } else {
    // Exercise is from another routine — add by name (will create in routine if needed)
    addNewExToSess(sessId, exName);
  }
}

function showNewExInput(sessId){
  var row=document.getElementById('new-ex-row-'+sessId);
  if(row){ row.classList.toggle('hidden'); document.getElementById('new-ex-inp-'+sessId).focus(); }
}

function confirmNewEx(sessId){
  var inp=document.getElementById('new-ex-inp-'+sessId);
  var name=(inp.value||'').trim();
  if(!name) return;
  addNewExToSess(sessId, name);
}

// ── RENDER LOG ────────────────────────────────────────────────────────────────
function renderLog(){
  document.getElementById('wknum').textContent=wkSeqNum(wkOff);
  document.getElementById('wkrange').textContent=wkRange(wkOff);

  var sessions=db.sessions.filter(function(s){ return inWeek(s.date,wkOff); })
    .sort(function(a,b){ return a.date.localeCompare(b.date); });

  var el=document.getElementById('sesslist');
  if(!sessions.length){
    el.innerHTML='<div class="empty"><span class="ico">🏋️</span>No sessions this week.<br>Tap <strong>+ Log Session</strong> to start.</div>';
    return;
  }

  el.innerHTML=sessions.map(function(sess){
    var r=findRoutine(sess.routineId);
    var rname=r? r.name : 'Unknown';
    var exList=sess.exercises||[];
    var vol=sessVol(sess);
    var isOpen=!!openCards[sess.id];
    var dStr=new Date(sess.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
    var exCount=exList.length;

    // Exercise blocks
    var exHtml=exList.map(function(ex){
      var p=calcProg(sess.routineId, ex.id, ex.name);
      var rec=recPanel(p, ex.name);
      var setRows=ex.sets.map(function(s,i){
        var uid2='u_'+sess.id+'_'+ex.id+'_'+i;
        return '<div class="set-row" id="'+uid2+'">'
          +'<span class="snum">'+(i+1)+'</span>'
          +'<select class="sel-w" id="'+uid2+'_w" onchange="updSet(\''+sess.id+'\',\''+ex.id+'\','+i+',\'w\',this.value)">'+W_OPTS+'</select>'
          +'<select class="sel-r" id="'+uid2+'_r" onchange="updSet(\''+sess.id+'\',\''+ex.id+'\','+i+',\'r\',this.value)">'+R_OPTS+'</select>'
          +'<button class="del-set" onclick="delSet(\''+sess.id+'\',\''+ex.id+'\','+i+')" title="Remove">&#215;</button>'
          +'</div>';
      }).join('');

      return '<div class="exb">'
        +'<div class="exb-head">'
        +'<div class="exb-name">'+esc(ex.name)+'</div>'
        +'<div class="exb-rec">'+rec.badge+'</div>'
        +'<button class="exb-del" onclick="removeExFromSess(\''+sess.id+'\',\''+ex.id+'\')" title="Remove exercise">&#215;</button>'
        +'</div>'
        +'<div class="exb-body">'
        +rec.panel
        +'<div class="sets-wrap" id="sw_'+sess.id+'_'+ex.id+'">'+setRows+'</div>'
        +'<div class="set-btns"><button class="btn-o" onclick="addSet(\''+sess.id+'\',\''+ex.id+'\')">+ Set</button></div>'
        +'</div>'
        +'</div>';
    }).join('<div class="divr"></div>');

    // Exercise picker — two sections: routine dropdown + cross-routine search
    var addedNames=exList.map(function(e){ return e.name.trim().toLowerCase(); });
    var available=r? r.exercises.filter(function(e){ return addedNames.indexOf(e.name.trim().toLowerCase())<0; }) : [];
    var pickerOpts='<option value="">From this routine\u2026</option>';
    available.forEach(function(e){
      var p=calcProg(sess.routineId, e.id, e.name);
      var hint='';
      if(p.t==='up') hint=' \u2191 '+p.target+' lbs';
      else if(p.t==='confirm') hint=' \u29d6 '+p.target+' lbs';
      else if(p.t==='hold'||p.t==='rebuild') hint=' \u2192 '+p.target+' lbs';
      else if(p.t==='down') hint=' \u2193 '+p.target+' lbs';
      else if(p.t==='none') hint=' \u2014 new';
      pickerOpts+='<option value="'+e.id+'">'+esc(e.name)+hint+'</option>';
    });

    var pickerHtml='<div class="ex-picker-wrap">'
      +'<div class="ex-picker-label">Add Exercise</div>'
      // Row 1: routine dropdown
      +'<div class="ex-picker-row">'
      +'<select class="ex-picker-sel" onchange="onExPickerChange(\''+sess.id+'\',this)">'+pickerOpts+'</select>'
      +'</div>'
      // Row 2: search input for cross-routine / new
      +'<div class="ex-search-row">'
      +'<div class="ex-search-label">Search all exercises or add new</div>'
      +'<div style="display:flex;gap:6px">'
      +'<input class="new-ex-input" id="new-ex-inp-'+sess.id+'"'
      +' placeholder="Type exercise name\u2026"'
      +' oninput="onExSearch(\''+sess.id+'\',this.value)"'
      +' onkeydown="if(event.key===\'Enter\')confirmNewEx(\''+sess.id+'\')" />'
      +'<button class="btn-o btn-g" onclick="confirmNewEx(\''+sess.id+'\')">Add</button>'
      +'</div>'
      +'<div class="ex-search-results" id="ex-sr-'+sess.id+'"></div>'
      +'</div>'
      +'</div>';

    return '<div class="scard'+(isOpen?' on':'')+'" id="sc-'+sess.id+'">'
      +'<div class="scard-head" onclick="toggleCard(\''+sess.id+'\')">'
      +'<span class="chev">&#9658;</span>'
      +'<div class="scard-info">'
      +'<div class="scard-rname">'+esc(rname)+'</div>'
      +'<div class="scard-date">'+dStr+'</div>'
      +'</div>'
      +'<div class="scard-meta">'+(vol>0? vol+' lbs<br>':'')+(exCount? exCount+' ex.':'')+'</div>'
      +'</div>'
      +'<div class="scard-body">'
      +(exHtml||'<div style="color:var(--muted);font-size:.82rem;padding:8px 0">No exercises yet \u2014 use the picker below.</div>')
      +pickerHtml
      +'<div class="sess-actions"><button class="btn-o btn-r" onclick="delSession(\''+sess.id+'\')">&#215; Delete Session</button></div>'
      +'</div></div>';
  }).join('');

  // Set dropdown values AFTER innerHTML
  sessions.forEach(function(sess){
    (sess.exercises||[]).forEach(function(ex){
      (ex.sets||[]).forEach(function(s,i){
        var uid2='u_'+sess.id+'_'+ex.id+'_'+i;
        var ws=document.getElementById(uid2+'_w');
        var rs=document.getElementById(uid2+'_r');
        if(ws) ws.value=s.w||0;
        if(rs) rs.value=s.r||0;
      });
    });
  });
}

// ── SESSION PICKER ────────────────────────────────────────────────────────────
function openPicker(){
  document.getElementById('m-date').value=todayStr();
  selRoutineId=db.routines.length? db.routines[0].id : null;
  renderPicker();
  document.getElementById('m-picker').classList.add('on');
}
function renderPicker(){
  var el=document.getElementById('m-rlist');
  if(!db.routines.length){
    el.innerHTML='<div style="color:var(--muted);font-size:.78rem;padding:6px">No routines yet \u2014 go to <strong>Routines</strong> first.</div>';
    return;
  }
  el.innerHTML=db.routines.map(function(r){
    var sel=selRoutineId===r.id;
    return '<div class="rpi'+(sel?' sel':'')+'" onclick="selR(\''+r.id+'\')">'
      +'<div><div class="rpi-name">'+esc(r.name)+'</div><div class="rpi-ct">'+r.exercises.length+' exercise'+(r.exercises.length!==1?'s':'')+'</div></div>'
      +(sel?'<span class="rpi-chk">&#10003;</span>':'')+'</div>';
  }).join('');
}
function selR(id){ selRoutineId=id; renderPicker(); }
function confirmSession(){
  if(!selRoutineId){ alert('Choose a routine.'); return; }
  var date=document.getElementById('m-date').value||todayStr();
  var sess={id:'s'+uid(), date:date, routineId:selRoutineId, exercises:[]};
  db.sessions.push(sess);
  openCards[sess.id]=true;
  dbSave(); closeOverlay('m-picker');
  var d=new Date(date+'T12:00:00'), now=new Date(); now.setHours(0,0,0,0);
  wkOff=Math.round((d-now)/604800000);
  switchTab('log', document.querySelector('.tab[data-tab="log"]'));
  renderLog();
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function renderProgress(){
  var el=document.getElementById('progcontent');
  if(!db.sessions.length){ el.innerHTML='<div class="empty"><span class="ico">📈</span>No sessions logged yet.</div>'; return; }

  // Collect unique exercises by NAME (not id) across all routines
  var allEx=[];
  db.routines.forEach(function(r){
    r.exercises.forEach(function(e){
      var nameLower=e.name.trim().toLowerCase();
      if(!allEx.find(function(x){ return x.name.trim().toLowerCase()===nameLower; }))
        allEx.push({id:e.id, name:e.name, routineId:r.id, routineName:r.name});
    });
  });
  if(!allEx.length){ el.innerHTML='<div class="empty"><span class="ico">📈</span>No exercises in your routines yet.</div>'; return; }

  var cards=allEx.map(function(ex){
    // History is now cross-routine by name
    var hist=getExHistory(ex.routineId, ex.id, ex.name);
    if(!hist.length) return '';
    var mws=hist.map(function(h){ return maxW(h.sets); });
    var vols=hist.map(function(h){ return h.sets.reduce(function(a,s){ return a+(s.w||0)*(s.r||0); },0); });
    mws=mws.slice().reverse(); vols=vols.slice().reverse();
    var bestW=Math.max.apply(null,mws), lastW=mws[mws.length-1];
    var isPR=lastW===bestW&&hist.length>1;
    var maxV=Math.max.apply(null,vols)||1;
    var bars=vols.slice(-10).map(function(v,i,arr){
      var bw=100/arr.length-1.5, bh=Math.max(3,(v/maxV)*30);
      return '<rect fill="'+(i===arr.length-1?'var(--accent)':'#2a3000')+'" x="'+(i*(100/arr.length+0.3))+'%" y="'+(32-bh)+'" width="'+bw+'%" height="'+bh+'"/>';
    }).join('');
    var p=calcProg(ex.routineId, ex.id, ex.name);
    var recStr=p.t==='up'? '&#8593; '+p.target+' lbs next'
      : p.t==='confirm'? '&#9670; '+p.target+' lbs (confirm)'
      : (p.t==='hold'||p.t==='rebuild')? '&#8594; Stay at '+lastW+' lbs' : '';
    // Show which routines this exercise appears in
    var routineNames=[];
    db.routines.forEach(function(r){
      if(r.exercises.find(function(e){ return e.name.trim().toLowerCase()===ex.name.trim().toLowerCase(); }))
        routineNames.push(r.name);
    });
    return '<div class="pcard">'
      +'<div class="pcard-name">'+esc(ex.name)+(isPR?'<span class="pr-tag">PR</span>':'')+'</div>'
      +'<div class="pcard-rout">'+esc(routineNames.join(' \u00b7 '))+'</div>'
      +'<div class="pstat"><span>Best</span><span>'+bestW+' lbs</span></div>'
      +'<div class="pstat"><span>Last</span><span>'+lastW+' lbs</span></div>'
      +'<div class="pstat"><span>Sessions</span><span>'+hist.length+'</span></div>'
      +(recStr?'<div class="pstat"><span>Rec.</span><span style="color:var(--accent)">'+recStr+'</span></div>':'')
      +(vols.length>1?'<svg class="spark" viewBox="0 0 100 32" preserveAspectRatio="none">'+bars+'</svg>':'')
      +'</div>';
  }).filter(Boolean).join('');

  el.innerHTML='<div class="sec-title">All Exercises</div><div class="pgrid">'+(cards||'<div class="empty">No data yet \u2014 log some sessions first.</div>')+'</div>';
}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function openSettings(){
  document.getElementById('s-inc').value=db.cfg.inc;
  document.getElementById('s-inc2').value=db.cfg.inc2;
  document.getElementById('s-sets').value=db.cfg.sets;
  document.getElementById('m-settings').classList.add('on');
}
function saveSettings(){
  db.cfg.inc=parseFloat(document.getElementById('s-inc').value)||5;
  db.cfg.inc2=parseFloat(document.getElementById('s-inc2').value)||10;
  db.cfg.sets=parseInt(document.getElementById('s-sets').value)||3;
  dbSave(); closeOverlay('m-settings'); renderLog();
}

// ── TABS & MODALS ─────────────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  if(btn) btn.classList.add('on');
  ['log','routines','progress'].forEach(function(t){
    document.getElementById('t-'+t).classList.toggle('hidden',t!==name);
  });
  if(name==='routines') renderRoutines();
  if(name==='progress') renderProgress();
}
function closeOverlay(id){ document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.overlay').forEach(function(el){
  el.addEventListener('click',function(e){ if(e.target===el) el.classList.remove('on'); });
});

// ── UTIL ──────────────────────────────────────────────────────────────────────
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── MIGRATION FROM ironlog4 ───────────────────────────────────────────────────
// Old format: sessions had sets:{exId:[{w,r}]}
// New format: sessions have exercises:[{id,name,sets:[{w,r}]}]
function migrateFromV4(){
  try{
    // Only migrate if ironlog5 is empty and ironlog4 exists
    var existing=localStorage.getItem(DB_KEY);
    if(existing) return; // already have v5 data, skip
    var old=localStorage.getItem('ironlog4');
    if(!old) return; // nothing to migrate
    var v4=JSON.parse(old);
    if(!v4||!v4.routines) return;

    // Migrate cfg
    if(v4.cfg){
      db.cfg.inc=v4.cfg.inc||5;
      db.cfg.inc2=v4.cfg.inc2||10;
      db.cfg.sets=v4.cfg.sets||3;
    }

    // Routines carry over as-is
    db.routines=v4.routines||[];

    // Build a lookup: exId -> {id, name, routineId}
    var exLookup={};
    (v4.routines||[]).forEach(function(r){
      (r.exercises||[]).forEach(function(e){
        exLookup[e.id]={id:e.id,name:e.name,routineId:r.id};
      });
    });

    // Migrate sessions
    db.sessions=(v4.sessions||[]).map(function(s){
      var exercises=[];
      // Old sets was {exId: [{w,r}]}
      if(s.sets && typeof s.sets==='object' && !Array.isArray(s.sets)){
        Object.keys(s.sets).forEach(function(exId){
          var exDef=exLookup[exId];
          if(!exDef) return; // skip orphaned exercise
          var sets=(s.sets[exId]||[]).filter(function(x){ return x.w||x.r; });
          if(!sets.length) return; // skip empty
          exercises.push({id:exDef.id, name:exDef.name, sets:sets});
        });
      } else if(Array.isArray(s.exercises)){
        // Already new format somehow
        exercises=s.exercises;
      }
      return {id:s.id, date:s.date, routineId:s.routineId, exercises:exercises};
    });

    dbSave();
    console.log('Migrated '+db.sessions.length+' sessions from ironlog4');
  }catch(e){
    console.warn('Migration failed, starting fresh:', e);
  }
}

// ── INIT ──────────────────────────────────────────────────────────────────────
migrateFromV4();
dbLoad();
renderLog();
</script>
