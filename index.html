<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>IRON LOG</title>
<style>
/* system font stack - no external deps */
:root{
  --bg:#0d0d0d;--surface:#141414;--card:#1a1a1a;--card2:#202020;
  --border:#2a2a2a;--border2:#383838;
  --accent:#d4f000;--red:#ff4422;--green:#22ff88;--blue:#00d4ff;
  --text:#f0f0f0;--muted:#666;--muted2:#999;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --fm:'SF Mono','Fira Code','Cascadia Code',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--f);min-height:100vh;padding-bottom:60px;font-size:15px}

/* HEADER */
.hdr{background:var(--surface);border-bottom:2px solid var(--accent);padding:14px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.hdr-title{font-size:1.6rem;font-weight:900;letter-spacing:-.02em;color:var(--accent)}
.hdr-title span{color:var(--text)}
.hdr-sub{font-size:.65rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.gear{margin-left:auto;background:none;border:1px solid var(--border);color:var(--muted);font-size:.7rem;padding:5px 11px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f)}
.gear:hover{border-color:var(--accent);color:var(--accent)}

/* TABS */
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 18px;overflow-x:auto}
.tab{background:none;border:none;border-bottom:3px solid transparent;color:var(--muted);font-size:.9rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:10px 16px;cursor:pointer;white-space:nowrap;transition:color .15s,border-color .15s;font-family:var(--f)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.on){color:var(--text)}

/* MAIN */
.main{max-width:860px;margin:0 auto;padding:18px 14px}

/* WEEK NAV */
.wknav{display:flex;align-items:center;gap:8px;margin-bottom:16px}
.wk-arrow{background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1rem;width:32px;height:32px;cursor:pointer;transition:all .15s;flex-shrink:0;font-family:var(--fm)}
.wk-arrow:hover{border-color:var(--accent);color:var(--accent)}
.wk-label{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.wk-label .n{color:var(--accent)}
.wk-today{background:none;border:1px solid var(--border);color:var(--muted);font-size:.65rem;padding:4px 9px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f)}
.wk-today:hover{border-color:var(--accent);color:var(--accent)}

/* BUTTONS */
.btn-y{background:var(--accent);border:none;color:#000;font-size:.9rem;font-weight:700;padding:9px 20px;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:background .15s;font-family:var(--f)}
.btn-y:hover{background:#fff}
.btn-o{background:none;border:1px solid var(--border);color:var(--muted);font-size:.7rem;padding:5px 12px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f)}
.btn-o:hover{border-color:var(--accent);color:var(--accent)}
.btn-r{color:#883333!important;border-color:#3a1515!important}
.btn-r:hover{color:var(--red)!important;border-color:var(--red)!important}

/* EMPTY */
.empty{text-align:center;color:var(--muted);padding:48px 20px;line-height:2.2;font-size:.85rem}
.empty .ico{font-size:2rem;display:block;margin-bottom:8px}

/* SESSION CARD */
.scard{background:var(--card);border:1px solid var(--border);margin-bottom:12px}
.scard-head{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none;border-bottom:1px solid transparent;transition:background .15s}
.scard-head:hover{background:var(--card2)}
.scard.on .scard-head{border-bottom-color:var(--border)}
.chev{color:var(--muted);font-size:.75rem;transition:transform .2s;flex-shrink:0}
.scard.on .chev{transform:rotate(90deg)}
.scard-rname{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.scard-date{font-size:.65rem;color:var(--muted);margin-top:1px}
.scard-vol{font-size:.7rem;color:var(--muted2);margin-left:auto;white-space:nowrap}
.scard-body{display:none;padding:14px}
.scard.on .scard-body{display:block}

/* EX BLOCK */
.exb{margin-bottom:16px}
.exb-name{font-size:.88rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;color:var(--muted2);margin-bottom:7px;padding-bottom:5px;border-bottom:1px solid var(--border)}
.sets-tbl{width:100%;border-collapse:collapse;font-size:.83rem;margin-bottom:7px;font-family:var(--fm)}
.sets-tbl th{text-align:left;color:var(--muted);font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;padding:3px 6px 6px;border-bottom:1px solid var(--border);font-family:var(--f)}
.sets-tbl td{padding:4px 6px;border-bottom:1px solid #1c1c1c;vertical-align:middle}
.sets-tbl tr:last-child td{border-bottom:none}
.sets-tbl input{background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:.85rem;padding:4px 6px;width:72px;outline:none;transition:border-color .15s;-moz-appearance:textfield}
.sets-tbl input::-webkit-outer-spin-button,.sets-tbl input::-webkit-inner-spin-button{-webkit-appearance:none}
.sets-tbl input:focus{border-color:var(--accent)}
.snum{color:var(--muted);font-size:.7rem;width:22px}
.vcell{color:var(--muted);font-size:.75rem}
.del-set{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.9rem;padding:2px 4px;transition:color .15s}
.del-set:hover{color:var(--red)}
.row-btns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}

/* PROG BOX */
.prog{background:var(--surface);border-left:3px solid var(--accent);padding:8px 12px;margin-top:9px;font-size:.75rem;line-height:1.7;font-family:var(--fm)}
.prog .ptitle{font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;font-family:var(--f)}
.prog .pup{color:var(--green);font-weight:bold}
.prog .pno{color:var(--muted);font-style:italic}
.prog .phold{color:var(--muted2)}

.divr{height:1px;background:var(--border);margin:12px 0}
.sess-actions{display:flex;gap:7px;flex-wrap:wrap;padding-top:12px;border-top:1px solid var(--border);margin-top:12px}

/* ROUTINES TAB */
.rout-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:8px;flex-wrap:wrap}
.sec-title{font-size:.75rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.tmpl-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
.tc{background:none;border:1px solid var(--border);color:var(--muted);font-size:.68rem;padding:4px 11px;cursor:pointer;letter-spacing:.07em;text-transform:uppercase;transition:all .15s;font-family:var(--f)}
.tc:hover{border-color:var(--blue);color:var(--blue)}
.rgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.rcard{background:var(--card);border:1px solid var(--border);transition:border-color .15s}
.rcard:hover{border-color:var(--border2)}
.rcard-h{display:flex;align-items:center;gap:8px;padding:11px 13px;border-bottom:1px solid var(--border)}
.rcard-name{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.rcard-ct{font-size:.65rem;color:var(--muted)}
.rcard-exlist{padding:9px 13px;display:flex;flex-direction:column;gap:3px}
.rex{font-size:.74rem;color:var(--muted2);display:flex;align-items:center;gap:5px}
.rex::before{content:'';display:inline-block;width:4px;height:4px;background:var(--accent);border-radius:50%;flex-shrink:0}
.rcard-foot{display:flex;gap:6px;padding:8px 13px;border-top:1px solid var(--border)}

/* EDITOR */
.editor{background:var(--card);border:1px solid var(--accent);padding:18px;margin-bottom:18px}
.editor h3{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:14px}
.frow{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.frow input{flex:1;min-width:140px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:.85rem;padding:7px 10px;outline:none;transition:border-color .15s}
.frow input:focus{border-color:var(--accent)}
.frow input::placeholder{color:var(--muted)}
.exchips{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.exc{display:flex;align-items:center;gap:7px;background:var(--surface);border:1px solid var(--border);padding:5px 9px;font-size:.78rem;font-family:var(--fm)}
.exc span{flex:1}
.exc button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.8rem;padding:0 3px;transition:color .15s}
.exc button:hover{color:var(--red)}
.ed-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:2px}

/* PROGRESS TAB */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.pcard{background:var(--card);border:1px solid var(--border);padding:12px 13px}
.pcard-name{font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.03em;margin-bottom:3px}
.pcard-rout{font-size:.6rem;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px}
.pstat{display:flex;justify-content:space-between;font-size:.7rem;color:var(--muted);margin-bottom:3px}
.pstat span:last-child{color:var(--text);font-family:var(--fm)}
.pr-tag{display:inline-block;background:var(--accent);color:#000;font-size:.55rem;font-weight:700;letter-spacing:.08em;padding:1px 5px;text-transform:uppercase;margin-left:5px;vertical-align:middle}
.spark{width:100%;height:34px;margin-top:7px}

/* MODALS */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;align-items:center;justify-content:center;padding:14px}
.overlay.on{display:flex}
.modal{background:var(--card);border:1px solid var(--accent);padding:20px;width:100%;max-width:400px;max-height:90vh;overflow-y:auto}
.modal h2{font-size:1.1rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--accent);margin-bottom:14px}
.modal label{display:block;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.modal input,.modal select{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--fm);font-size:.85rem;padding:7px 10px;outline:none;margin-bottom:12px;transition:border-color .15s}
.modal input:focus,.modal select:focus{border-color:var(--accent)}
.mactions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px}
.rpicker{display:flex;flex-direction:column;gap:5px;max-height:240px;overflow-y:auto;margin-bottom:12px}
.rpi{display:flex;align-items:center;gap:9px;background:var(--surface);border:1px solid var(--border);padding:8px 11px;cursor:pointer;transition:border-color .15s}
.rpi:hover{border-color:var(--blue)}
.rpi.sel{border-color:var(--accent)}
.rpi-name{font-size:.95rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex:1}
.rpi-ct{font-size:.63rem;color:var(--muted)}
.rpi-chk{color:var(--accent)}

.hidden{display:none!important}

@media(max-width:460px){
  .main{padding:12px 10px}
  .sets-tbl input{width:60px}
  .rgrid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="hdr">
  <div>
    <div class="hdr-title">IRON<span> LOG</span></div>
    <div class="hdr-sub">Workout Tracker</div>
  </div>
  <button class="gear" onclick="openSettings()">&#9881; Settings</button>
</header>

<nav class="tabs">
  <button class="tab on" data-tab="log" onclick="switchTab('log',this)">Log</button>
  <button class="tab" data-tab="routines" onclick="switchTab('routines',this)">Routines</button>
  <button class="tab" data-tab="progress" onclick="switchTab('progress',this)">Progress</button>
</nav>

<div class="main">

  <!-- LOG -->
  <div id="t-log">
    <div class="wknav">
      <button class="wk-arrow" onclick="changeWeek(-1)">&#8249;</button>
      <div class="wk-label">Week <span class="n" id="wknum">1</span> &mdash; <span id="wkrange"></span></div>
      <button class="wk-today" onclick="resetWeek()">Today</button>
      <button class="wk-arrow" onclick="changeWeek(1)">&#8250;</button>
    </div>
    <div style="margin-bottom:18px">
      <button class="btn-y" onclick="openPicker()">+ Log Session</button>
    </div>
    <div id="sesslist"></div>
  </div>

  <!-- ROUTINES -->
  <div id="t-routines" class="hidden">
    <div id="editor" class="editor hidden">
      <h3 id="ed-title">New Routine</h3>
      <div class="frow"><input type="text" id="rname" placeholder="Routine name (e.g. Push Day)"/></div>
      <div class="sec-title" style="margin-top:6px">Exercises</div>
      <div class="exchips" id="ed-exlist"></div>
      <div class="frow">
        <input type="text" id="exinput" placeholder="Add exercise..." onkeydown="if(event.key==='Enter')addEdEx()"/>
        <button class="btn-o" onclick="addEdEx()">+ Add</button>
      </div>
      <div class="ed-actions">
        <button class="btn-y" onclick="saveRoutine()">Save Routine</button>
        <button class="btn-o" onclick="closeEditor()">Cancel</button>
      </div>
    </div>
    <div class="rout-bar">
      <div style="font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em">My Routines</div>
      <button class="btn-y" onclick="openEditor(null)">+ New Routine</button>
    </div>
    <div style="margin-bottom:14px">
      <div class="sec-title">Quick Templates</div>
      <div class="tmpl-chips">
        <button class="tc" onclick="useTemplate('push')">Push Day</button>
        <button class="tc" onclick="useTemplate('pull')">Pull Day</button>
        <button class="tc" onclick="useTemplate('legs')">Leg Day</button>
        <button class="tc" onclick="useTemplate('upper')">Upper Body</button>
        <button class="tc" onclick="useTemplate('lower')">Lower Body</button>
        <button class="tc" onclick="useTemplate('full')">Full Body</button>
      </div>
    </div>
    <div class="rgrid" id="routinelist"></div>
  </div>

  <!-- PROGRESS -->
  <div id="t-progress" class="hidden">
    <div id="progcontent"></div>
  </div>

</div>

<!-- SESSION PICKER MODAL -->
<div class="overlay" id="m-picker">
  <div class="modal">
    <h2>Log a Session</h2>
    <label>Date</label>
    <input type="date" id="m-date"/>
    <label>Routine</label>
    <div class="rpicker" id="m-rlist"></div>
    <div class="mactions">
      <button class="btn-o" onclick="closeOverlay('m-picker')">Cancel</button>
      <button class="btn-o" style="border-color:var(--accent);color:var(--accent)" onclick="confirmSession()">Start &rarr;</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="m-settings">
  <div class="modal">
    <h2>Settings</h2>
    <label>Progression Rule</label>
    <select id="s-rule">
      <option value="dp">Double Progression (hit rep target then add weight)</option>
      <option value="lin">Linear (add weight every session)</option>
      <option value="vol">Volume (beat last session's total volume)</option>
    </select>
    <label>Rep Target</label>
    <input type="number" id="s-reps" min="1" max="50"/>
    <label>Weight Increment (lbs)</label>
    <input type="number" id="s-inc" min="0.5" max="100" step="0.5"/>
    <div class="mactions">
      <button class="btn-o" onclick="closeOverlay('m-settings')">Cancel</button>
      <button class="btn-o" style="border-color:var(--accent);color:var(--accent)" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
var DB_KEY = 'ironlog4';
var db = { cfg:{rule:'dp',reps:12,inc:5}, routines:[], sessions:[] };

function dbLoad(){
  try{ var s=localStorage.getItem(DB_KEY); if(s) db=JSON.parse(s); }catch(e){}
}
function dbSave(){
  try{ localStorage.setItem(DB_KEY,JSON.stringify(db)); }catch(e){}
}

// ── WEEK HELPERS ───────────────────────────────────────────────────────────
var wkOff = 0;

function monOf(offset){
  var d=new Date(); d.setHours(0,0,0,0);
  d.setDate(d.getDate()-((d.getDay()+6)%7)+offset*7);
  return d;
}
function sunOf(offset){ var d=monOf(offset); d.setDate(d.getDate()+6); return d; }

function inWeek(ds,off){
  var d=new Date(ds+'T12:00:00');
  return d>=monOf(off) && d<=sunOf(off);
}

function wkRange(off){
  var m=monOf(off), s=sunOf(off);
  var f=function(d){ return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); };
  return f(m)+' \u2013 '+f(s);
}

function wkSeqNum(off){
  var ms=monOf(off).toISOString().slice(0,10);
  var starts=[];
  db.sessions.forEach(function(s){
    var d=new Date(s.date+'T12:00:00');
    var m=new Date(d); m.setHours(0,0,0,0);
    m.setDate(m.getDate()-((m.getDay()+6)%7));
    var key=m.toISOString().slice(0,10);
    if(starts.indexOf(key)<0) starts.push(key);
  });
  starts.sort();
  if(!starts.length) return 1;
  var i=starts.indexOf(ms);
  return i<0 ? starts.length+1 : i+1;
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function changeWeek(d){ wkOff+=d; renderLog(); }
function resetWeek(){ wkOff=0; renderLog(); }

// ── TEMPLATES ──────────────────────────────────────────────────────────────
var TMPL = {
  push:{name:'Push Day',ex:['Bench Press','Overhead Press','Incline DB Press','Tricep Pushdown','Lateral Raises']},
  pull:{name:'Pull Day',ex:['Deadlift','Barbell Row','Lat Pulldown','Face Pulls','Barbell Curl']},
  legs:{name:'Leg Day',ex:['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raises']},
  upper:{name:'Upper Body',ex:['Bench Press','Barbell Row','Overhead Press','Pull-ups','Curls']},
  lower:{name:'Lower Body',ex:['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raises']},
  full:{name:'Full Body',ex:['Squat','Bench Press','Barbell Row','Overhead Press','Romanian Deadlift']}
};

function useTemplate(k){
  var t=TMPL[k];
  if(!t||!confirm('Add "'+t.name+'" as a new routine?')) return;
  var exs=t.ex.map(function(n){ return {id:'e'+Date.now()+Math.random().toString(36).slice(2),name:n}; });
  db.routines.push({id:'r'+Date.now(),name:t.name,exercises:exs});
  dbSave(); renderRoutines();
}

// ── ROUTINE EDITOR ─────────────────────────────────────────────────────────
var edId=null, edExs=[];

function openEditor(id){
  edId=id||null; edExs=[];
  if(id){
    var r=findRoutine(id);
    if(r){ document.getElementById('rname').value=r.name; edExs=r.exercises.map(function(e){ return {id:e.id,name:e.name}; }); }
    document.getElementById('ed-title').textContent='Edit Routine';
  } else {
    document.getElementById('rname').value='';
    document.getElementById('ed-title').textContent='New Routine';
  }
  renderEdExs();
  var el=document.getElementById('editor');
  el.classList.remove('hidden');
  el.scrollIntoView({behavior:'smooth',block:'start'});
}

function closeEditor(){
  document.getElementById('editor').classList.add('hidden');
  edId=null; edExs=[];
}

function addEdEx(){
  var inp=document.getElementById('exinput');
  var n=(inp.value||'').trim(); if(!n) return;
  edExs.push({id:'e'+Date.now()+Math.random().toString(36).slice(2),name:n});
  inp.value=''; renderEdExs(); inp.focus();
}

function rmEdEx(i){ edExs.splice(i,1); renderEdExs(); }

function moveEdEx(i,d){
  var j=i+d;
  if(j<0||j>=edExs.length) return;
  var tmp=edExs[i]; edExs[i]=edExs[j]; edExs[j]=tmp;
  renderEdExs();
}

function renderEdExs(){
  var el=document.getElementById('ed-exlist');
  if(!edExs.length){ el.innerHTML='<div style="color:var(--muted);font-size:.75rem;padding:3px 0">No exercises yet.</div>'; return; }
  el.innerHTML=edExs.map(function(e,i){
    return '<div class="exc"><span>'+esc(e.name)+'</span>'
      +'<button onclick="moveEdEx('+i+',-1)"'+(i===0?' style="opacity:.2"':'')+'>&#8593;</button>'
      +'<button onclick="moveEdEx('+i+',1)"'+(i===edExs.length-1?' style="opacity:.2"':'')+'>&#8595;</button>'
      +'<button onclick="rmEdEx('+i+')">&#215;</button>'
      +'</div>';
  }).join('');
}

function saveRoutine(){
  var name=(document.getElementById('rname').value||'').trim();
  if(!name){ alert('Give this routine a name.'); return; }
  if(edId){
    var r=findRoutine(edId);
    if(r){ r.name=name; r.exercises=edExs.slice(); }
  } else {
    db.routines.push({id:'r'+Date.now(),name:name,exercises:edExs.slice()});
  }
  dbSave(); closeEditor(); renderRoutines();
}

function deleteRoutine(id){
  var n=db.sessions.filter(function(s){ return s.routineId===id; }).length;
  var msg='Delete this routine?'+(n?' (referenced by '+n+' session'+(n>1?'s':'')+')':'');
  if(!confirm(msg)) return;
  db.routines=db.routines.filter(function(r){ return r.id!==id; });
  dbSave(); renderRoutines();
}

function findRoutine(id){ return db.routines.find(function(r){ return r.id===id; })||null; }

function renderRoutines(){
  var el=document.getElementById('routinelist');
  if(!db.routines.length){
    el.innerHTML='<div class="empty" style="grid-column:1/-1"><span class="ico">📋</span>No routines yet.<br>Create one above or use a template.</div>';
    return;
  }
  el.innerHTML=db.routines.map(function(r){
    var exHtml=r.exercises.slice(0,5).map(function(e){ return '<div class="rex">'+esc(e.name)+'</div>'; }).join('');
    if(r.exercises.length>5) exHtml+='<div class="rex" style="color:var(--muted)">+'+(r.exercises.length-5)+' more</div>';
    if(!r.exercises.length) exHtml='<div style="color:var(--muted);font-size:.72rem">No exercises</div>';
    return '<div class="rcard">'
      +'<div class="rcard-h"><div class="rcard-name">'+esc(r.name)+'</div><div class="rcard-ct">'+r.exercises.length+' ex.</div></div>'
      +'<div class="rcard-exlist">'+exHtml+'</div>'
      +'<div class="rcard-foot">'
      +'<button class="btn-o" onclick="openEditor(\''+r.id+'\')">&#9998; Edit</button>'
      +'<button class="btn-o btn-r" onclick="deleteRoutine(\''+r.id+'\')">&#215; Delete</button>'
      +'</div></div>';
  }).join('');
}

// ── SESSIONS ───────────────────────────────────────────────────────────────
var openCards = {};
var selRoutineId = null;

function sessVol(s){
  var v=0;
  Object.values(s.sets).forEach(function(arr){ arr.forEach(function(x){ v+=(x.w||0)*(x.r||0); }); });
  return v;
}

function addSet(sid,eid){
  var s=db.sessions.find(function(x){ return x.id===sid; }); if(!s) return;
  if(!s.sets[eid]) s.sets[eid]=[];
  s.sets[eid].push({w:0,r:0});
  dbSave(); renderLog();
}

function delSet(sid,eid,i){
  var s=db.sessions.find(function(x){ return x.id===sid; }); if(!s||!s.sets[eid]) return;
  s.sets[eid].splice(i,1);
  dbSave(); renderLog();
}

function updSet(sid,eid,i,field,val){
  var s=db.sessions.find(function(x){ return x.id===sid; }); if(!s||!s.sets[eid]) return;
  s.sets[eid][i][field]=parseFloat(val)||0;
  dbSave();
}

function delSession(id){
  if(!confirm('Delete this session?')) return;
  db.sessions=db.sessions.filter(function(s){ return s.id!==id; });
  delete openCards[id];
  dbSave(); renderLog();
}

function toggleCard(id){
  openCards[id]=!openCards[id];
  var c=document.getElementById('sc-'+id); if(c) c.classList.toggle('on');
}

// ── PROGRESSION ────────────────────────────────────────────────────────────
function calcProg(routineId,exId){
  var cfg=db.cfg;
  var past=db.sessions.filter(function(s){
    return s.routineId===routineId && s.sets[exId] && s.sets[exId].length>0;
  }).sort(function(a,b){ return b.date.localeCompare(a.date); });

  if(!past.length) return {t:'none'};

  var sets=past[0].sets[exId];
  var maxW=sets.reduce(function(a,s){ return Math.max(a,s.w||0); },0);

  if(cfg.rule==='dp'){
    var allHit=sets.every(function(s){ return (s.r||0)>=cfg.reps; });
    if(allHit) return {t:'up',msg:'All sets hit '+cfg.reps+'+ reps \u2192 Add '+cfg.inc+' lbs next session'};
    var avg=(sets.reduce(function(a,s){ return a+(s.r||0); },0)/sets.length).toFixed(1);
    return {t:'hold',msg:'Avg reps: '+avg+'/'+cfg.reps+' \u2192 Keep hitting '+cfg.reps+' reps before adding weight'};
  }
  if(cfg.rule==='lin') return {t:'up',msg:'Linear \u2192 Add '+cfg.inc+' lbs next session'};
  if(cfg.rule==='vol'){
    if(past.length<2) return {t:'none'};
    var vol1=sets.reduce(function(a,s){ return a+(s.w||0)*(s.r||0); },0);
    var vol2=past[1].sets[exId].reduce(function(a,s){ return a+(s.w||0)*(s.r||0); },0);
    if(vol1>=vol2) return {t:'up',msg:'Volume beat last session \u2192 Add '+cfg.inc+' lbs next session'};
    return {t:'hold',msg:'Volume '+vol1+' vs '+vol2+' lbs \u2192 Match last session first'};
  }
  return {t:'none'};
}

function progHtml(routineId,exId){
  var p=calcProg(routineId,exId);
  if(p.t==='none') return '<div class="prog"><div class="ptitle">Next Session</div><span class="pno">No previous data yet \u2014 log a set to get recommendations.</span></div>';
  if(p.t==='up') return '<div class="prog"><div class="ptitle">Next Session</div><span class="pup">\u2191 '+p.msg+'</span></div>';
  return '<div class="prog"><div class="ptitle">Next Session</div><span class="phold">\u2192 '+p.msg+'</span></div>';
}

// ── RENDER LOG ─────────────────────────────────────────────────────────────
function renderLog(){
  document.getElementById('wknum').textContent=wkSeqNum(wkOff);
  document.getElementById('wkrange').textContent=wkRange(wkOff);

  var sessions=db.sessions.filter(function(s){ return inWeek(s.date,wkOff); })
    .sort(function(a,b){ return a.date.localeCompare(b.date); });

  var el=document.getElementById('sesslist');
  if(!sessions.length){
    el.innerHTML='<div class="empty"><span class="ico">🏋️</span>No sessions this week.<br>Tap <strong>+ Log Session</strong> to start.</div>';
    return;
  }

  el.innerHTML=sessions.map(function(sess){
    var r=findRoutine(sess.routineId);
    var rname=r?r.name:'Unknown Routine';
    var vol=sessVol(sess);
    var isOpen=!!openCards[sess.id];
    var dStr=new Date(sess.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

    var exHtml=(r?r.exercises:[]).map(function(ex,xi){
      var sets=sess.sets[ex.id]||[];
      var rows=sets.map(function(s,i){
        return '<tr>'
          +'<td class="snum">'+(i+1)+'</td>'
          +'<td><input type="number" value="'+(s.w||'')+'" placeholder="0" min="0" step="2.5"'
          +' oninput="updSet(\''+sess.id+'\',\''+ex.id+'\','+i+',\'w\',this.value)"/></td>'
          +'<td><input type="number" value="'+(s.r||'')+'" placeholder="0" min="0" step="1"'
          +' oninput="updSet(\''+sess.id+'\',\''+ex.id+'\','+i+',\'r\',this.value)"/></td>'
          +'<td class="vcell">'+((s.w||0)*(s.r||0))+' lbs</td>'
          +'<td><button class="del-set" onclick="delSet(\''+sess.id+'\',\''+ex.id+'\','+i+')">&#215;</button></td>'
          +'</tr>';
      }).join('');

      return (xi>0?'<div class="divr"></div>':'')
        +'<div class="exb">'
        +'<div class="exb-name">'+esc(ex.name)+'</div>'
        +'<table class="sets-tbl"><thead><tr>'
        +'<th>#</th><th>Weight (lbs)</th><th>Reps</th><th>Volume</th><th></th>'
        +'</tr></thead><tbody>'+rows+'</tbody></table>'
        +'<div class="row-btns"><button class="btn-o" onclick="addSet(\''+sess.id+'\',\''+ex.id+'\')">+ Set</button></div>'
        +progHtml(sess.routineId,ex.id)
        +'</div>';
    }).join('');

    return '<div class="scard'+(isOpen?' on':'')+'" id="sc-'+sess.id+'">'
      +'<div class="scard-head" onclick="toggleCard(\''+sess.id+'\')">'
      +'<span class="chev">&#9658;</span>'
      +'<div><div class="scard-rname">'+esc(rname)+'</div><div class="scard-date">'+dStr+'</div></div>'
      +'<div class="scard-vol">'+(vol>0?vol+' lbs':'')+'</div>'
      +'</div>'
      +'<div class="scard-body">'
      +(exHtml||'<div class="empty" style="padding:16px">No exercises in this routine.</div>')
      +'<div class="sess-actions"><button class="btn-o btn-r" onclick="delSession(\''+sess.id+'\')">&#215; Delete Session</button></div>'
      +'</div></div>';
  }).join('');
}

// ── SESSION PICKER ─────────────────────────────────────────────────────────
function openPicker(){
  document.getElementById('m-date').value=todayStr();
  selRoutineId=db.routines.length?db.routines[0].id:null;
  renderPicker();
  document.getElementById('m-picker').classList.add('on');
}

function renderPicker(){
  var el=document.getElementById('m-rlist');
  if(!db.routines.length){
    el.innerHTML='<div style="color:var(--muted);font-size:.78rem;padding:6px">No routines yet \u2014 go to the <strong>Routines</strong> tab first.</div>';
    return;
  }
  el.innerHTML=db.routines.map(function(r){
    var sel=selRoutineId===r.id;
    return '<div class="rpi'+(sel?' sel':'')+'" onclick="selR(\''+r.id+'\')">'
      +'<div><div class="rpi-name">'+esc(r.name)+'</div><div class="rpi-ct">'+r.exercises.length+' exercise'+(r.exercises.length!==1?'s':'')+'</div></div>'
      +(sel?'<span class="rpi-chk">&#10003;</span>':'')
      +'</div>';
  }).join('');
}

function selR(id){ selRoutineId=id; renderPicker(); }

function confirmSession(){
  if(!selRoutineId){ alert('Choose a routine.'); return; }
  var date=document.getElementById('m-date').value||todayStr();
  var r=findRoutine(selRoutineId); if(!r) return;
  var sets={};
  r.exercises.forEach(function(e){ sets[e.id]=[]; });
  var sess={id:'s'+Date.now(),date:date,routineId:selRoutineId,sets:sets};
  db.sessions.push(sess);
  openCards[sess.id]=true;
  dbSave();
  closeOverlay('m-picker');
  // jump to that week
  var d=new Date(date+'T12:00:00'), now=new Date(); now.setHours(0,0,0,0);
  wkOff=Math.round((d-now)/604800000);
  switchTab('log',document.querySelector('.tab[data-tab="log"]'));
  renderLog();
}

// ── PROGRESS ───────────────────────────────────────────────────────────────
function renderProgress(){
  var el=document.getElementById('progcontent');
  if(!db.sessions.length){ el.innerHTML='<div class="empty"><span class="ico">📈</span>No sessions logged yet.</div>'; return; }
  var allEx=[];
  db.routines.forEach(function(r){
    r.exercises.forEach(function(e){
      if(!allEx.find(function(x){ return x.id===e.id; }))
        allEx.push({id:e.id,name:e.name,routineId:r.id,routineName:r.name});
    });
  });
  if(!allEx.length){ el.innerHTML='<div class="empty"><span class="ico">📈</span>Add exercises to your routines to see progress.</div>'; return; }

  var cards=allEx.map(function(ex){
    var sesses=db.sessions.filter(function(s){
      return s.routineId===ex.routineId && s.sets[ex.id] && s.sets[ex.id].length>0;
    }).sort(function(a,b){ return a.date.localeCompare(b.date); });
    if(!sesses.length) return '';

    var mws=sesses.map(function(s){ return s.sets[ex.id].reduce(function(a,x){ return Math.max(a,x.w||0); },0); });
    var vols=sesses.map(function(s){ return s.sets[ex.id].reduce(function(a,x){ return a+(x.w||0)*(x.r||0); },0); });
    var bestW=Math.max.apply(null,mws), lastW=mws[mws.length-1];
    var isPR=lastW===bestW&&sesses.length>1;
    var maxV=Math.max.apply(null,vols)||1;

    var bars=vols.slice(-10).map(function(v,i,arr){
      var bw=100/arr.length-1.5, bh=Math.max(3,(v/maxV)*30);
      return '<rect fill="'+(i===arr.length-1?'var(--accent)':'#303800')+'" x="'+(i*(100/arr.length+0.3))+'%" y="'+(32-bh)+'" width="'+bw+'%" height="'+bh+'"/>';
    }).join('');

    return '<div class="pcard">'
      +'<div class="pcard-name">'+esc(ex.name)+(isPR?'<span class="pr-tag">PR</span>':'')+'</div>'
      +'<div class="pcard-rout">'+esc(ex.routineName)+'</div>'
      +'<div class="pstat"><span>Best Weight</span><span>'+bestW+' lbs</span></div>'
      +'<div class="pstat"><span>Last Session</span><span>'+lastW+' lbs</span></div>'
      +'<div class="pstat"><span>Sessions</span><span>'+sesses.length+'</span></div>'
      +(vols.length>1?'<svg class="spark" viewBox="0 0 100 32" preserveAspectRatio="none">'+bars+'</svg>':'')
      +'</div>';
  }).filter(Boolean).join('');

  el.innerHTML='<div class="sec-title">All Exercises</div><div class="pgrid">'+(cards||'<div class="empty">No data yet.</div>')+'</div>';
}

// ── SETTINGS ───────────────────────────────────────────────────────────────
function openSettings(){
  document.getElementById('s-rule').value=db.cfg.rule;
  document.getElementById('s-reps').value=db.cfg.reps;
  document.getElementById('s-inc').value=db.cfg.inc;
  document.getElementById('m-settings').classList.add('on');
}
function saveSettings(){
  db.cfg.rule=document.getElementById('s-rule').value;
  db.cfg.reps=parseInt(document.getElementById('s-reps').value)||12;
  db.cfg.inc=parseFloat(document.getElementById('s-inc').value)||5;
  dbSave(); closeOverlay('m-settings'); renderLog();
}

// ── TABS & MODALS ──────────────────────────────────────────────────────────
function switchTab(name,btn){
  document.querySelectorAll('.tab').forEach(function(b){ b.classList.remove('on'); });
  if(btn) btn.classList.add('on');
  ['log','routines','progress'].forEach(function(t){
    document.getElementById('t-'+t).classList.toggle('hidden',t!==name);
  });
  if(name==='routines') renderRoutines();
  if(name==='progress') renderProgress();
}
function closeOverlay(id){ document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.overlay').forEach(function(el){
  el.addEventListener('click',function(e){ if(e.target===el) el.classList.remove('on'); });
});

// ── UTIL ───────────────────────────────────────────────────────────────────
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ───────────────────────────────────────────────────────────────────
dbLoad();
renderLog();
</script>
